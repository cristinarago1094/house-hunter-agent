name: Daily House Hunter Run

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  daily-run:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render daily-run endpoint
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DAILY_RUN_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DAILY_RUN_SECRET }}"
